name: Build and Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ github.event.release.tag_name && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, github.event.release.tag_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old untagged versions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="meddlingkids"
          OWNER="${{ github.repository_owner }}"

          # Fetch all untagged version IDs (metadata.container.tags is empty)
          VERSION_IDS=$(gh api \
            --paginate \
            "/users/${OWNER}/packages/container/${PACKAGE}/versions" \
            --jq '.[] | select(.metadata.container.tags | length == 0) | .id')

          if [ -z "$VERSION_IDS" ]; then
            echo "No untagged versions found"
            exit 0
          fi

          COUNT=$(echo "$VERSION_IDS" | wc -l)
          echo "Found $COUNT untagged version(s) to delete"

          for ID in $VERSION_IDS; do
            echo "Deleting version $ID..."
            gh api --method DELETE \
              "/users/${OWNER}/packages/container/${PACKAGE}/versions/${ID}" \
              || echo "Failed to delete version $ID"
          done

          echo "Cleanup complete"
